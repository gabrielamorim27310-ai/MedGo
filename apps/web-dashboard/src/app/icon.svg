    <linearGradient id="amber" x1="22" y1="9" x2="42" y2="13" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCD34D"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Cartão -->
  <rect x="6" y="4" width="52" height="56" rx="12" fill="url(#bg)"/>
  <!-- Brilho de vidro -->
